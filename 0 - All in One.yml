    {
      "name": "Input - Skip DV / TS files (leave as-is)",
      "sourceRepo": "Community",
      "pluginName": "customFunction",
      "version": "1.0.0",
      "inputsDB": {
        "code": "module.exports = async (args) => { const obj = args.inputFileObj || {}; const f = String(obj.file || obj._id || '').toLowerCase(); const fpd = JSON.stringify(obj.ffProbeData || {}).toLowerCase(); const dvFile = ['[dv ','[dv]','[dv-','dolby vision','dv hdr','dovi','dvhe','dvh1'].some(function(k){return f.includes(k);}); const dvProbe = ['dovi','dolby vision','dvhe','dvh1','dv_profile','dovi configuration'].some(function(k){return fpd.includes(k);}); const isDV = dvFile || dvProbe; const isTS = f.endsWith('.ts'); const streams=((obj.ffProbeData||{}).streams)||[]; const realVid=[]; for (const s of streams){   if(s.codec_type==='video'){     const ap=(s.disposition&&s.disposition.attached_pic)?1:0;     const isImg=['png','mjpeg','mjpegb','bmp','gif'].indexOf(String(s.codec_name||'').toLowerCase())>=0;     if(!ap&&!isImg){ realVid.push(s); }   } } const noVideo = realVid.length===0; const skip = isDV || isTS || noVideo; args.jobLog('skipDVTS: skip='+skip+' isDV='+isDV+' isTS='+isTS+' noVideo='+noVideo); return { outputFileObj: args.inputFileObj, outputNumber: skip ? 1 : 2, variables: args.variables };};"
      },
