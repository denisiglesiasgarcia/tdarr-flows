        "code": "module.exports = async (args) => {\n  try {\n    const streams = ((args.inputFileObj || {}).ffProbeData || {}).streams || [];\n    const audioStreams = streams.filter(s => s.codec_type === 'audio');\n\n    if (audioStreams.length === 0) {\n      args.jobLog('Audio: no audio streams found, skipping encode');\n      return { outputFileObj: args.inputFileObj, outputNumber: 1, variables: args.variables };\n    }\n\n    const allAAC = audioStreams.every(s => (s.codec_name || '').toLowerCase() === 'aac');\n    if (allAAC) {\n      args.jobLog('Audio: all tracks already AAC, skipping encode');\n      return { outputFileObj: args.inputFileObj, outputNumber: 1, variables: args.variables };\n    }\n\n    const parts = audioStreams.map((s, i) => {\n      const codec = (s.codec_name || '').toLowerCase();\n      if (codec === 'aac') {\n        return `-c:a:${i} copy`;\n      }\n      const ch = parseInt(s.channels) || 2;\n      const br = ch <= 1 ? '96k' : ch <= 2 ? '192k' : ch <= 6 ? '448k' : '640k';\n      return `-c:a:${i} aac -b:a:${i} ${br}`;\n    });\n\n    args.variables.aac_encode_args = parts.join(' ');\n    args.jobLog('Audio: AAC encode args: ' + args.variables.aac_encode_args);\n    return { outputFileObj: args.inputFileObj, outputNumber: 2, variables: args.variables };\n  } catch (err) {\n    args.jobLog('Audio: error in AAC check: ' + err.message + ' \u2014 skipping encode');\n    return { outputFileObj: args.inputFileObj, outputNumber: 1, variables: args.variables };\n  }\n};"
      },
