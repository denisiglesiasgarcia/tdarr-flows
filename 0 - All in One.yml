        "code": "module.exports = async (args) => { const streams = (args.inputFileObj.ffProbeData || {}).streams || []; const imgs = ['png','mjpeg','mjpegb','bmp','gif']; const v = streams.find(function(s){ return s.codec_type==='video' && !(s.disposition && s.disposition.attached_pic) && imgs.indexOf(String(s.codec_name||'').toLowerCase())<0; }); const pf = v ? String(v.pix_fmt||'').toLowerCase() : ''; const is420 = pf.indexOf('420')>=0; const nonChroma = (pf.indexOf('444')>=0 || pf.indexOf('422')>=0 || pf.indexOf('440')>=0 || pf.indexOf('411')>=0 || pf.indexOf('gbr')>=0 || pf.indexOf('rgb')>=0); let fix=''; if (pf && !is420 && nonChroma){ const hi = pf.indexOf('10')>=0 || pf.indexOf('12')>=0 || pf.indexOf('16')>=0; fix = hi ? '-pix_fmt p010le' : '-pix_fmt yuv420p'; } if(!args.variables.user){ args.variables.user = {}; } args.variables.user.fl_pix_fmt = fix; args.jobLog('pixFmtFix: src_pix_fmt='+pf+' inject=\"'+fix+'\"'); return { outputFileObj: args.inputFileObj, outputNumber: 1, variables: args.variables }; };"
