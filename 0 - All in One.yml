    {
      "name": "Sort & Tag - Detect Dolby Vision \ud83d\udd0d",
      "sourceRepo": "Community",
      "pluginName": "customFunction",
      "version": "1.0.0",
      "inputsDB": {
        "code": "module.exports = async (args) => { const { spawnSync } = require('child_process'); const dvStrings = ['dovi', 'dolby vision', 'dvhe', 'dvh1', 'dv_profile', 'dv_bl_signal', 'dovi configuration record']; const dvFilePatterns = ['[dv ', '[dv]', '[dv-', 'dolby vision', 'dv hdr', 'dovi', 'dvhe', 'dvh1']; const hasDVStr = (s) => dvStrings.some(k => s.includes(k)); const hasDVFile = (s) => dvFilePatterns.some(k => s.includes(k)); let hasDV = false; const dbg = []; try { const file = args.inputFileObj.file; const objStr = JSON.stringify(args.inputFileObj).toLowerCase(); dbg.push('obj_len:' + objStr.length); if (hasDVFile(objStr)) { hasDV = true; dbg.push('DV:obj_filename'); } if (!hasDV) { const fpd = args.inputFileObj.ffProbeData || {}; const cachedStr = JSON.stringify(fpd).toLowerCase(); dbg.push('cached_len:' + cachedStr.length); if (hasDVStr(cachedStr)) { hasDV = true; dbg.push('DV:cached_json'); } } if (!hasDV) { const streams = (args.inputFileObj.ffProbeData || {}).streams || []; for (const s of streams) { if (s.codec_type !== 'video') continue; dbg.push('vtag:' + s.codec_tag_string + ' sdl:' + (Array.isArray(s.side_data_list) ? s.side_data_list.length : 'none') + ' tags:' + JSON.stringify(s.tags||{})); } } if (!hasDV) { const base = args.ffmpegPath || '/usr/local/bin/tdarr-ffmpeg'; const derived = base.replace(/ffmpeg$/, 'ffprobe'); const candidates = [derived, '/usr/local/bin/tdarr-ffprobe', '/usr/local/bin/ffprobe', '/usr/bin/ffprobe', 'tdarr-ffprobe', 'ffprobe']; for (const fp of candidates) { const rJson = spawnSync(fp, ['-v', 'warning', '-show_streams', '-show_format', '-show_private_data', '-print_format', 'json', file], { timeout: 60000, encoding: 'utf8' }); const ecode = rJson.error ? rJson.error.code : 'ok'; dbg.push('fp:' + fp.split('/').pop() + ' e:' + ecode + ' json_out:' + (rJson.stdout||'').length); if (!rJson.error) { const jsonCombined = ((rJson.stdout||'') + (rJson.stderr||'')).toLowerCase(); if (hasDVStr(jsonCombined)) { hasDV = true; dbg.push('DV:fp_json_private'); break; } const rText = spawnSync(fp, ['-v', 'warning', '-show_streams', '-show_private_data', file], { timeout: 60000, encoding: 'utf8' }); const textOut = ((rText.stdout||'') + (rText.stderr||'')).toLowerCase(); dbg.push('text_out:' + textOut.length); if (hasDVStr(textOut)) { hasDV = true; dbg.push('DV:fp_text'); break; } dbg.push('hasDV:false_after_both'); break; } } } } catch(e) { dbg.push('ex:' + e.message); hasDV = false; } console.error('DV_detect_01: ' + dbg.join(' | ')); return { outputFileObj: args.inputFileObj, outputNumber: hasDV ? 1 : 2, variables: args.variables }; };"
      },
