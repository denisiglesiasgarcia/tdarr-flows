        "code": "module.exports = async (args) => { const fs = require('fs'); const obj = args.inputFileObj || {}; const file = obj._id || obj.file; args.jobLog('Checking node write access to original file: ' + file); try { const fd = fs.openSync(file, 'r+'); fs.closeSync(fd); args.jobLog('Write access OK: node can write the original file.'); } catch (err) { let who = 'unknown'; try { who = process.getuid() + ':' + process.getgid(); } catch (e) {} args.jobLog('FAIL: original file is NOT writable by this Tdarr node (' + err.code + '); node uid:gid=' + who + '; file=' + file + '. Fix ownership/permissions so the node can write it, then re-queue.'); throw new Error('Original file not writable by Tdarr node (' + err.code + '): ' + file); } return { outputFileObj: args.inputFileObj, outputNumber: 1, variables: args.variables }; };"
