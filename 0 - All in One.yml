    {
      "name": "Video - Detect Dolby Vision (fresh ffprobe) \ud83d\udd0d",
      "sourceRepo": "Community",
      "pluginName": "customFunction",
      "version": "1.0.0",
      "inputsDB": {
        "code": "module.exports = async (args) => { const { spawnSync } = require('child_process'); const dvFilePatterns = ['[dv ', '[dv]', '[dv-', 'dolby vision', 'dv hdr', 'dovi', 'dvhe', 'dvh1']; const dvProbeStrings = ['dovi', 'dolby vision', 'dvhe', 'dvh1', 'dv_profile', 'dovi configuration record']; const hasDVFile = (s) => dvFilePatterns.some(k => s.includes(k)); const hasDVProbe = (s) => dvProbeStrings.some(k => s.includes(k)); let hasDV = false; const dbg = []; try { const file = args.inputFileObj.file || ''; dbg.push('file_end:' + file.slice(-60)); const objStr = JSON.stringify(args.inputFileObj).toLowerCase(); if (hasDVFile(objStr)) { hasDV = true; dbg.push('DV:filename'); } if (!hasDV) { const fpd = args.inputFileObj.ffProbeData || {}; if (hasDVProbe(JSON.stringify(fpd).toLowerCase())) { hasDV = true; dbg.push('DV:cached_ffprobe'); } } if (!hasDV) { const base = args.ffmpegPath || '/usr/local/bin/tdarr-ffmpeg'; const fp = base.replace(/ffmpeg$/, 'ffprobe'); const r = spawnSync(fp, ['-v', 'verbose', '-show_streams', '-show_private_data', file], { timeout: 60000, encoding: 'utf8' }); if (!r.error) { const out = ((r.stdout||'') + (r.stderr||'')).toLowerCase(); dbg.push('probe_out:' + out.length); if (hasDVProbe(out) || hasDVFile(out)) { hasDV = true; dbg.push('DV:ffprobe'); } } else { dbg.push('probe_err:' + r.error.code); } } } catch(e) { dbg.push('ex:' + e.message); hasDV = false; } console.log('DV_check_video: hasDV=' + hasDV + ' | ' + dbg.join(' | ')); return { outputFileObj: args.inputFileObj, outputNumber: hasDV ? 1 : 2, variables: args.variables }; };"
